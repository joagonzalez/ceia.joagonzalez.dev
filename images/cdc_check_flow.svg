ext></g><!--link mongo to dag--><g id="link_mongo_dag"><path d="M39.46,63.09 C36.14,80.85 34.81,103.92 44,122 C50.87,135.51 57.403,143.2028 69.603,152.2628 " fill="none" id="mongo-to-dag" style="stroke:#444444;stroke-width:1.0;"/><polygon fill="#444444" points="74.42,155.84,69.5793,147.2628,70.4058,152.859,64.8097,153.6855,74.42,155.84" style="stroke:#444444;stroke-width:1.0;"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="122" x="45" y="105.1387">count_documents()</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="104" x="54" y="119.1074">(16 colecciones)</text></g><!--link postgres to dag--><g id="link_postgres_dag"><path d="M200.12,63.01 C192.9,80.33 182.79,102.93 172,122 C165.55,133.4 161.0499,140.4552 153.7199,150.7952 " fill="none" id="postgres-to-dag" style="stroke:#444444;stroke-width:1.0;"/><polygon fill="#444444" points="150.25,155.69,158.7181,150.661,153.1416,151.611,152.1917,146.0344,150.25,155.69" style="stroke:#444444;stroke-width:1.0;"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="107" x="189" y="105.1387">SELECT COUNT(*)</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="111" x="187" y="119.1074">(16 tablas smd_*)</text></g><!--link dag to mailgun--><g id="link_dag_mailgun"><path d="M201.63,185 C241,185 282.49,185 316.99,185 " fill="none" id="dag-to-mailgun" style="stroke:#444444;stroke-width:1.0;"/><polygon fill="#444444" points="322.99,185,313.99,181,317.99,185,313.99,189,322.99,185" style="stroke:#444444;stroke-width:1.0;"/><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="85" x="219.75" y="151.1387">[discrepancia</text><text fill="#000000" font-family="DejaVu Sans" font-size="12" lengthAdjust="spacing" textLength="78" x="223.25" y="165.1074">significativa]</text><text fill="#000000" font-family="D